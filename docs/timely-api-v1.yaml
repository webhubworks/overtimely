paths:
  /webhook-events:
    get:
      summary: Webhook event types
      description: >-
        This is a documentation-only endpoint describing the webhook event
        payloads.


        When you subscribe to webhook events, Timely will send HTTP POST
        requests to your configured URL with the following payloads:


        | Event | Payload Schema |

        |-------|----------------|

        | `hours:created` | Hour |

        | `hours:updated` | Hour |

        | `hours:deleted` | Hour |

        | `projects:created` | Project |

        | `projects:updated` | Project |

        | `projects:deleted` | Project |

        | `labels:created` | Label |

        | `labels:updated` | Label |

        | `labels:deleted` | Label |

        | `forecasts:created` | Forecast |

        | `forecasts:updated` | Forecast |

        | `forecasts:deleted` | Forecast |


        See the webhook events below for the exact payload schemas.
      tags:
        - Webhook Events
      x-scalar-ignore: true
      responses:
        "200":
          description: Documentation only
