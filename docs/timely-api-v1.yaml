  /1.1/{account_id}/bulk/hours:
    post:
      summary: Bulk import time entries (create/update/delete)
      security:
        - oauth2:
            - manage
      tags:
        - Bulk Operations
      operationId: bulkImportHours
      description: Create, update, or delete multiple time entries in a single
        request. For large operations (100+ records), the operation runs
        asynchronously and returns a job ID.
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
        - name: account_id
          in: path
          description: Workspace id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Time entries imported successfully (synchronous)
          content:
            application/json:
              examples:
                Time entries imported successfully (synchronous):
                  value:
                    deleted_ids: []
                    created_ids:
                      - 1
                    updated_ids: []
                    errors:
                      create: []
                      update: []
                      delete: []
                    job: null
              schema:
