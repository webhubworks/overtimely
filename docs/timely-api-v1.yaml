          properties:
            large_retina:
              format: uri
              type: string
            large:
              format: uri
              type: string
            medium_retina:
              format: uri
              type: string
            medium:
              format: uri
              type: string
            small_retina:
              format: uri
              type: string
            small:
              format: uri
              type: string
          required:
            - large_retina
            - large
            - medium_retina
            - medium
            - small_retina
            - small
        work_days:
          type: string
          description: "Coma separated working days. Example:
            *'SUN,MON,TUE,WED,THU,FRI,SAT'*"
        weekdays:
          type: string
          description: "Coma separated working days. Example: *'SU,MO,TU,WE,TH,FR,SA'*"
        weekly_capacity:
          type: number
          description: Specifies the user's weekly hour capacity. The default is account's
