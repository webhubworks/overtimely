        users:
          type: array
          description: Array of team user objects with details
        project_ids:
          type: array
          description: Array of project IDs associated with the team
          items:
            type: integer
      required:
        - id
        - name
        - color
        - emoji
        - external_id
    V1.UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          description: Error message
          minLength: 1
      required:
        - error
    V1.UnprocessableEntityError:
      type: object
      properties:
        errors:
          type: object
          description: Error details
          additionalProperties:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
      required:
        - errors
    V1.UserCapacity:
      type: object
      properties:
        id:
          type:
            - "null"
            - integer
          description: Capacity ID. Null for default capacity
        weekly_capacity:
          type: number
          description: Specifies the user's weekly hour capacity. The default is account's
            weekly capacity. Can only have a decimal place of .5 (e.g. 3.5
            hours)
          minimum: 0
        daily_capacity:
          type: number
          description: Specifies the user's daily hour capacity
          minimum: 0
        weekdays:
          type:
            - "null"
            - string
          description: "Legacy weekday format. Example: *'MO,TU,WE,TH,FR'*"
        work_days:
          type: string
          description: "Comma-separated working days. Example: *'MON,TUE,WED,THU,FRI'*"
        total_working_days:
          type:
            - "null"
            - integer
          description: Total working days in the capacity period. Null for open-ended
            capacities
          minimum: 0
        weekly_working_days:
          type: integer
          description: Specifies the number of user's weekly working days
          minimum: 0
          maximum: 7
        current:
          type: boolean
          description: True if this is the active capacity (no end date)
        start_date:
          type: string
          format: date
          description: ISO8601 start date
        end_date:
          type:
            - "null"
            - string
          description: ISO8601 end date. Null for open-ended capacities
          format: date
      required:
        - weekly_capacity
        - daily_capacity
        - work_days
        - weekly_working_days
        - current
        - start_date
    V1.User:
      type: object
