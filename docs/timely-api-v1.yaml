  /1.1/{account_id}/bulk/events:
    post:
      summary: Bulk import events (create/update/delete)
      security:
        - oauth2:
            - manage
      tags:
        - Bulk Operations
      operationId: bulkImportEvents
      description: Create, update, or delete multiple events in a single request.
        Events are the same as time entries - this is an alias endpoint. For
        large operations (100+ records), the operation runs asynchronously and
        returns a job ID.
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
        - name: account_id
          in: path
          description: Workspace id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Events imported successfully (synchronous)
          content:
            application/json:
              examples:
                Events imported successfully (synchronous):
                  value:
                    deleted_ids: []
                    created_ids:
                      - 1
                    updated_ids: []
                    errors:
                      create: []
                      update: []
                      delete: []
                    job: null
              schema:
                $ref: "#/components/schemas/V1.Bulk.ImportResponse"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V1.Bulk.HoursImport"
            examples:
              Events imported successfully (synchronous):
                summary: Events imported successfully (synchronous)
                value:
                  create:
                    - hours: 2
                      minutes: 0
                      seconds: 0
                      day: 2024-01-15
                      note: Test event
                      user_id: 1
                      project_id: 1
  /1.1/{account_id}/clients:
    get:
      summary: List all clients of an account
      security:
        - oauth2:
            - manage
      tags:
        - Clients
      description: "NOTE: By default, client list will return first 10000 clients in
        alphabetical order. You can also use optional parameters like “limit”,
        “offset”, “show” and “order” to change the results."
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          description: Account ID for the clients you want to retrieve
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          description: Retrieve number of clients
          schema:
            type: integer
            default: 10000
        - name: order
          in: query
          description: '"asc (default)" and "desc"'
          schema:
            type: string
            default: asc
        - name: offset
          in: query
          description: Retrieve clients from offset
          schema:
            type: integer
            default: 0
        - name: show
          in: query
          schema:
            type: string
            enum:
              - all
              - active
              - archived
          description: 'Specifies which records to retrieve. Example: "show=all" or
            "show=active" or "show=archived"'
      responses:
        "200":
          description: Client details
          content:
            application/json:
              examples:
                Client details:
                  value:
                    - id: 1
                      name: Company 1
                      color: 00796b
                      active: true
                      external_id: null
                      updated_at: 2024-01-01T00:00:00Z
                      external_references: []
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/V1.Company"
    post:
      summary: Client create
      security:
        - oauth2:
            - manage
      tags:
        - Clients
      operationId: createClient
      description: This API lets you create a client for an account.
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
        - name: account_id
          in: path
          schema:
            type: integer
          description: Account ID for the client you want to create
          required: true
      responses:
        "200":
          description: Client
          content:
            application/json:
              examples:
                Client:
                  value:
                    id: 1
                    name: New Client
                    color: A020F0
                    active: true
                    external_id: null
                    updated_at: 2024-01-01T00:00:00Z
              schema:
                $ref: "#/components/schemas/V1.Company"
        "403":
          description: Forbidden - Insufficient permissions to create client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.ForbiddenError"
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.UnprocessableEntityError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V1.Companies.Create"
            examples:
              Client:
                summary: Client
                value:
                  client:
                    name: New Client
  /1.1/{account_id}/clients/{id}:
    get:
      summary: Client details
      security:
        - oauth2:
            - manage
      tags:
        - Clients
      description: Client details and project counts
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          required: true
        - name: account_id
          in: path
          schema:
            type: integer
          description: Account ID for the client you want to retrieve
          required: true
        - name: id
          in: path
          schema:
            type: integer
          description: Client ID to retrieve
          required: true
        - name: project_counts
          in: query
          schema:
            type: string
          description: 'Specify to retrieve project counts. Example values: "true" or
            "false"'
          required: false
      responses:
        "200":
          description: Client details
          content:
            application/json:
              examples:
                Client details:
                  value:
                    id: 1
                    name: Company 1
                    color: 1976d2
                    active: true
                    external_id: null
                    updated_at: 2024-01-01T00:00:00Z
                    external_references: []
              schema:
                $ref: "#/components/schemas/V1.Company"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.NotFoundError"
    put:
      summary: Client update
      security:
        - oauth2:
            - manage
      tags:
        - Clients
      description: Update client details just by using a client ID.
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
        - name: account_id
          in: path
          schema:
            type: integer
          description: Account ID for the client you want to update
          required: true
