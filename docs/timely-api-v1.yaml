                        type: object
                        properties:
                          project_id:
                            type: integer
                          hour_rate:
                            type: number
                        required:
                          - project_id
                - type: array
                  items:
                    type: object
                    properties:
                      project_id:
                        type: integer
                      hour_rate:
                        type: number
                    required:
                      - project_id
            user_level:
              type: string
              description: >-
                **(Deprecated)**  
                                         Specifies the user level  
                                         Required if **role_id** is blank.  
                                         Must be **normal** if **role_id** is blank and **admin** is true  
                                         Must be **limited** if **role_id** is blank and **hide_hourly_rate** is true  
