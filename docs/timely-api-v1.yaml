            manage: Grants access
    bearer_token:
      type: http
      scheme: bearer
      description: Bearer token authentication. Tokens can be obtained via OAuth2 or
        from the docs login.
  schemas:
    V1.Bulk.HoursImport:
      type: object
      properties:
        create:
          type: array
          description: Array of time entries to create. Each item accepts all standard
            event/time entry fields from PayloadSchema.
          items:
            type: object
            properties:
              user_id:
                type: integer
              project_id:
                type: integer
              hours:
                type: integer
                minimum: 0
              minutes:
                type: integer
                minimum: 0
                maximum: 59
              seconds:
                type: integer
                minimum: 0
                maximum: 59
              from:
                type:
                  - "null"
                  - string
              to:
                type:
                  - "null"
                  - string
              day:
                type: string
              note:
                type:
                  - "null"
                  - string
              sequence:
                type: integer
              estimated_hours:
                type: integer
                minimum: 0
              estimated_minutes:
                type: integer
                minimum: 0
                maximum: 59
              billed:
                type: boolean
              locked:
                type: boolean
              billable:
                type: boolean
              hour_rate:
                type: number
              internal_hour_rate:
                type: number
              timer_state:
                type: integer
              suggestion_id:
                type:
                  - "null"
                  - integer
              autosheet_proposal_id:
                type:
                  - "null"
                  - string
              external_id:
                type:
                  - "null"
                  - string
              forecast_id:
                type:
                  - "null"
                  - integer
              forecast_completed_at:
                type:
                  - "null"
                  - string
              state_id:
                type:
                  - "null"
                  - integer
              project_join_mode:
                type: string
                enum:
                  - add
                  - log_once
              label_ids:
                type: array
                items:
                  type: integer
              user_ids:
                type: array
                items:
                  type: integer
              entry_ids:
                type: array
                items:
                  type: integer
              timestamps:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    from:
                      type:
                        - "null"
                        - string
                    to:
                      type:
                        - "null"
                        - string
                    entry_ids:
                      type: array
                      items:
                        type: integer
              external_links:
                type: array
                items:
                  type: object
                  properties:
                    provider_id:
                      type: string
                    provider_type:
                      type: string
                    external_id:
                      type: string
                    data:
                      type: object
                    uri:
                      type: string
                  required:
                    - provider_id
                    - provider_type
                    - external_id
            required:
              - project_id
              - day
        update:
          type: array
          description: Array of time entries to update. Must include id field. All other
            fields from UpdatePayloadSchema are optional.
          items:
            type: object
            properties:
              id:
                type: integer
                description: Time entry ID to update
            required:
              - id
        delete:
          type: array
          description: Array of time entry IDs to delete
          items:
            type: integer
        delete_by_autosheet_proposal_id:
          type:
            - "null"
            - string
          description: Delete every time entry linked to this AutoSheet proposal UUID in a
            single round-trip (autosheet revert). Honours the same
            permission/lock guards as `delete`; deleted IDs are returned in
            `deleted_ids`.
