                  type: string
                  format: date
                end_date:
                  type:
                    - "null"
                    - string
                  format: date
              required:
                - weekly_capacity
                - daily_capacity
                - work_days
                - weekly_working_days
                - current
                - start_date
            properties_attributes:
              type: array
              description: Array item can describe **update** | **delete** | **create**
                actions
              items:
                anyOf:
                  - type: object
                    properties:
                      id:
                        type: integer
                      value:
                        type: string
                        minLength: 1
                        maxLength: 50
                    required:
                      - id
                      - value
                  - type: object
                    properties:
                      id:
                        type: integer
                      _destroy:
                        type: boolean
                    required:
                      - id
                      - _destroy
                  - type: object
                    properties:
                      account_user_property_id:
                        type: integer
                      value:
                        type: string
                        minLength: 1
                        maxLength: 50
                    required:
                      - account_user_property_id
                      - value
