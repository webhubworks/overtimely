  /1.1/{account_id}/webhooks:
    get:
      summary: List all webhooks
      security:
        - oauth2:
            - manage
      tags:
        - Webhooks
      operationId: listWebhooks
      description: Retrieve all webhooks configured for the account. Webhooks allow
        you to receive HTTP POST notifications when events occur.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: OAuth 2.0 Bearer token
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Maximum number of webhooks to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of webhooks to skip
      responses:
        "200":
          description: Webhooks list retrieved successfully
          content:
            application/json:
              examples:
                Webhooks list retrieved successfully:
                  value:
                    - id: 1
                      account_id: 1
                      url: https://example.com/webhook1
                      subscriptions:
                        - hours:created
                      secret_token: null
                      active: true
                      custom_headers: {}
                      created_at: 2024-01-01T00:00:00Z
                      updated_at: 2024-01-01T00:00:00Z
                    - id: 1
                      account_id: 1
                      url: https://example.com/webhook2
                      subscriptions:
                        - projects:updated
                      secret_token: null
                      active: true
                      custom_headers: {}
                      created_at: 2024-01-01T00:00:00Z
                      updated_at: 2024-01-01T00:00:00Z
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/V1.Webhook"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.UnauthorizedError"
    post:
      summary: Create a new webhook
      security:
        - oauth2:
            - manage
      tags:
        - Webhooks
      operationId: createWebhook
      description: >
        Create a new webhook subscription. Webhooks allow you to receive HTTP
        POST notifications when events occur in your account.


        **Supported Events:**

        - `hours:created` - When a new time entry is created

        - `hours:updated` - When a time entry is updated

        - `hours:deleted` - When a time entry is deleted

        - `projects:created` - When a new project is created

        - `projects:updated` - When a project is updated

        - `projects:deleted` - When a project is deleted

        - `labels:created` - When a new label is created

        - `labels:updated` - When a label is updated

        - `labels:deleted` - When a label is deleted

        - `forecasts:created` - When a new forecast is created

        - `forecasts:updated` - When a forecast is updated

        - `forecasts:deleted` - When a forecast is deleted


        **Security:**

        When a `secret_token` is provided, each webhook request will include an
        `X-Signature` header containing an HMAC-SHA256 signature of the request
        body. You can use this to verify the authenticity of incoming webhook
        requests.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: OAuth 2.0 Bearer token
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
      responses:
        "201":
          description: Webhook created successfully
          content:
            application/json:
              examples:
                Webhook created successfully:
                  value:
                    id: 1
                    account_id: 1
                    url: https://example.com/my-webhook
                    subscriptions:
                      - hours:created
                      - hours:updated
                    secret_token: my-secret-token
                    active: true
                    custom_headers: {}
                    created_at: 2024-01-01T00:00:00Z
                    updated_at: 2024-01-01T00:00:00Z
              schema:
                $ref: "#/components/schemas/V1.Webhook"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.ValidationError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V1.Webhooks.Create"
            examples:
              Webhook created successfully:
                summary: Webhook created successfully
                value:
                  webhook:
                    url: https://example.com/my-webhook
                    subscriptions:
                      - hours:created
                      - hours:updated
                    secret_token: my-secret-token
                    active: true
