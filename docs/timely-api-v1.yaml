              type: object
              properties:
                id:
                  type:
                    - "null"
                    - integer
                weekly_capacity:
                  type: number
                  minimum: 0
                daily_capacity:
                  type: number
                  minimum: 0
                weekdays:
                  type:
                    - "null"
                    - string
                work_days:
                  type: string
                total_working_days:
                  type:
                    - "null"
                    - integer
                  minimum: 0
                weekly_working_days:
                  type: integer
                  minimum: 0
                  maximum: 7
