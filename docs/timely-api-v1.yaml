    get:
      summary: Filter reports
      security:
        - oauth2:
            - manage
      tags:
        - Reports
      operationId: filterReports
      description: Filter and retrieve report data with flexible grouping options.
        Returns aggregated totals grouped by clients, projects, users, labels,
        days, or teams. Use scope=events to retrieve individual time entries
        instead of aggregated totals.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: OAuth 2.0 Bearer token
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
        - name: since
          in: query
          schema:
            type: string
            format: date
          description: "Start date for the report period (ISO 8601 format: YYYY-MM-DD)"
        - name: until
          in: query
          schema:
            type: string
            format: date
          description: "End date for the report period (ISO 8601 format: YYYY-MM-DD)"
        - name: user_ids
          in: query
          description: Comma-separated list of user IDs to filter by
          schema:
            type: string
        - name: project_ids
          in: query
          description: Comma-separated list of project IDs to filter by
          schema:
            type: string
        - name: client_ids
          in: query
          description: Comma-separated list of client IDs to filter by
          schema:
            type: string
        - name: label_ids
          in: query
          description: Comma-separated list of label IDs to filter by
          schema:
            type: string
        - name: team_ids
          in: query
          description: Comma-separated list of team IDs to filter by (requires teams
            feature)
          schema:
            type: string
        - name: state_ids
          in: query
          description: Comma-separated list of state IDs to filter by
          schema:
            type: string
        - name: group_by
          in: query
          description: "Comma-separated list of grouping keys: clients, users, labels,
            days, teams. Default: all groups"
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
            enum:
              - totals
              - events
          description: "Result scope: totals (aggregated data) or events (individual
            entries). Default: totals"
        - name: billed
          in: query
          schema:
            type: string
            enum:
              - "true"
              - "false"
          description: Filter by billed status
