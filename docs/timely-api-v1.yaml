  /1.1/{account_id}/forecasts/{resource}/summary:
    get:
      summary: Task summaries
      security:
        - oauth2:
            - manage
      tags:
        - Forecasts (Tasks)
      operationId: listTaskSummaries
      description: Get task summaries grouped by resource type (users or projects).
        Returns aggregate counts and duration totals.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: OAuth 2.0 Bearer token
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
          description: Account ID
        - name: resource
          in: path
          required: true
          schema:
            type: string
            enum:
              - users
              - projects
          description: Resource type to group summaries by
        - name: since
          in: query
          schema:
            type: string
            format: date
          description: Filter tasks from this date
          required: false
        - name: until
          in: query
          schema:
            type: string
            format: date
          description: Filter tasks up to this date
          required: false
        - name: completed
          in: query
          schema:
            type: string
            enum:
              - "true"
              - "false"
          description: Filter by completion status
          required: false
        - name: user_ids
          in: query
          schema:
            type: string
          description: Comma-separated user IDs to filter by
          required: false
        - name: project_ids
          in: query
          schema:
            type: string
          description: Comma-separated project IDs to filter by
          required: false
        - name: forecast_ids
          in: query
          schema:
            type: string
          description: Comma-separated task IDs to filter by
          required: false
      responses:
        "200":
          description: Task summaries
          content:
            application/json:
              examples:
                Task summaries:
                  value:
                    - task_count: 1
                      estimated_total:
                        hours: 6
                        minutes: 0
                        seconds: 0
                        formatted: 06:00
                        total_hours: 6
                        total_seconds: 21600
                        total_minutes: 360
                      logged_total:
                        hours: 0
                        minutes: 0
                        seconds: 0
                        formatted: 00:00
                        total_hours: 0
                        total_seconds: 0
                        total_minutes: 0
                      planned_total:
                        hours: 0
                        minutes: 0
                        seconds: 0
                        formatted: 00:00
                        total_hours: 0
                        total_seconds: 0
                        total_minutes: 0
                      due_dates:
                        - 2019-05-15
                      user_id: null
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/V1.ForecastSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.UnauthorizedError"
  /1.1/{account_id}/hours:
    get:
      summary: List time entries
      security:
        - oauth2:
            - manage
      tags:
        - Events
      operationId: listTimeEntries
      description: List all time entries in the Timely account. Time entries will be
        returned in a paginated format with optional filtering.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: OAuth 2.0 Bearer token
        - name: account_id
          in: path
          required: true
          schema:
            type: integer
          description: Account ID for the time entries you want to retrieve
        - name: since
          in: query
          schema:
            type: string
            format: date
          description: Filter time entries from this date (inclusive). Both since and upto
            needs to be present
          required: false
        - name: upto
          in: query
          schema:
            type: string
            format: date
          description: Filter time entries up to this date (inclusive). Both since and
            upto needs to be present
          required: false
        - name: day
          in: query
          schema:
            type: string
            format: date
          description: Filter time entries for a specific date. Defaults to current date
            if omitted. Disregarded if since and upto is present
          required: false
        - name: hour_ids
          in: query
          schema:
            type: string
          description: Comma-separated list of time entry IDs to filter by
          required: false
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - day
              - created_at
              - updated_at
          description: Field to sort by
          required: false
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          description: Sort order
          required: false
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5000
          description: Number of results per page (max 5000)
          required: false
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: Page number for pagination
          required: false
        - name: project_id
          in: query
          schema:
            type: integer
          description: Filter by project ID
          required: false
        - name: user_id
          in: query
          schema:
            type: integer
          description: Filter by user ID
          required: false
        - name: autosheet_proposal_id
          in: query
          schema:
            type: string
          description: Filter to hours linked to a specific AutoSheet proposal UUID
          required: false
        - name: include_linked_metadata
          in: query
          schema:
            type: boolean
          description: When true, response includes a linked_work_items array with id,
            title, and sync_status for each linked work item. Requires the
            integrations feature to be enabled on the account.
          required: false
      responses:
