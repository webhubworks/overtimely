  /1.1/{account_id}/users/compliance:
    get:
      summary: List per-user compliance metrics
      security:
        - oauth2:
            - manage
      tags:
        - Compliance
      operationId: listCompliance
      description: Returns per-user time-tracking compliance metrics for a
        configurable date window. Includes total/AI hours, automation rate, last
        seen / memory state from the Timely app, last hours logged timestamp,
        per-user windowed Memory app and logged-day counts, and the
        workspace-level Memory app adoption percentage. Defaults to the last 30
        days through today when from/to are omitted.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: OAuth 2.0 Bearer token
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
          required: false
          description: ISO date inclusive start of window (defaults to 30 days before `to`)
        - name: to
          in: query
          schema:
            type: string
            format: date
          required: false
          description: ISO date inclusive end of window (defaults to today)
      responses:
        "200":
          description: Compliance metrics retrieved successfully
          content:
            application/json:
              examples:
                Compliance metrics retrieved successfully:
                  value:
                    users: []
                    period:
                      from: 2023-12-02
                      to: 2024-01-01
                    memory_app_adoption_pct: 0
              schema:
                $ref: "#/components/schemas/V1.ComplianceResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.UnauthorizedError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.ForbiddenError"
  /1.1/{account_id}/day_properties:
    get:
      summary: List day properties
      security:
        - oauth2:
            - manage
      tags:
        - Day Properties
      operationId: listDayProperties
      description: >
        Retrieve day properties (locked days) for users in the account. Day
        properties control whether time entries can be modified for specific
        dates.


        You can filter by date range using `since` and `until` parameters, or by
        specific dates using the `dates` parameter.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: OAuth 2.0 Bearer token
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
        - name: since
          in: query
          schema:
            type: string
            format: date
          required: false
          description: Start date for filtering (YYYY-MM-DD)
        - name: until
          in: query
          schema:
            type: string
            format: date
          required: false
          description: End date for filtering (YYYY-MM-DD)
        - name: dates
          in: query
          schema:
            type: string
          required: false
          description: Comma-separated list of specific dates (YYYY-MM-DD)
      responses:
        "200":
          description: Day properties retrieved successfully
          content:
            application/json:
              examples:
                Day properties retrieved successfully:
                  value:
                    - id: 1
                      user_id: 1
                      account_id: 1
                      date: 2024-01-01
                      locked: true
                      updated_at: 1704067200
                      created_at: 1704067200
                    - id: 1
                      user_id: 1
                      account_id: 1
                      date: 2024-01-02
                      locked: true
                      updated_at: 1704067200
                      created_at: 1704067200
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/V1.DayProperty"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.UnauthorizedError"
    post:
      summary: Create or update day properties
      security:
        - oauth2:
            - manage
      tags:
        - Day Properties
      operationId: createDayProperties
      description: >
        Create or update day properties to lock or unlock days for time entry
        modifications. This endpoint allows bulk operations across multiple
        users and dates.


        When a day is locked, users cannot create, update, or delete time
        entries for that date. Only users with appropriate permissions (admins
        or managers) can lock/unlock days.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: OAuth 2.0 Bearer token
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
      responses:
        "201":
          description: Day properties created successfully
          content:
            application/json:
              examples:
                Day properties created successfully:
                  value:
                    - id: 1
                      user_id: 1
                      account_id: 1
                      date: 2024-01-01
                      locked: true
                      updated_at: 1704067200
                      created_at: 1704067200
                    - id: 1
                      user_id: 1
                      account_id: 1
                      date: 2024-01-02
                      locked: true
                      updated_at: 1704067200
                      created_at: 1704067200
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/V1.DayProperty"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.UnauthorizedError"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.ValidationError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V1.DayProperties.Create"
            examples:
              Day properties created successfully:
                summary: Day properties created successfully
                value:
                  day_property:
                    dates:
                      - 2024-01-01
                      - 2024-01-02
                    user_ids:
                      - 1
                    locked: true
    put:
      summary: Update day properties
      security:
        - oauth2:
            - manage
      tags:
        - Day Properties
      operationId: updateDayProperties
      description: >
        Update day properties to lock or unlock days for time entry
        modifications. This endpoint allows bulk operations across multiple
        users and dates.


        Use `locked: false` to unlock previously locked days, allowing users to
        modify time entries for those dates again.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: OAuth 2.0 Bearer token
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
      responses:
        "200":
          description: Day properties updated successfully
          content:
            application/json:
              examples:
                Day properties updated successfully:
                  value:
                    - id: 1
                      user_id: 1
                      account_id: 1
                      date: 2024-01-01
                      locked: false
                      updated_at: 1704067200
                      created_at: 1704067200
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/V1.DayProperty"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1.ValidationError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V1.DayProperties.Update"
            examples:
              Day properties updated successfully:
                summary: Day properties updated successfully
                value:
                  day_property:
                    dates:
                      - 2024-01-01
                    user_ids:
                      - 1
                    locked: false
