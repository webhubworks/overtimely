    V1.Webhook:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the webhook
        account_id:
          type: integer
          description: Account ID the webhook belongs to
        url:
          type: string
          description: URL to send webhook payloads to (must be HTTPS)
        subscriptions:
          type: array
          description: List of event types to subscribe to
          items:
            enum:
              - forecasts:created
              - forecasts:updated
              - forecasts:deleted
              - hours:created
              - hours:updated
              - hours:deleted
              - labels:created
              - labels:updated
              - labels:deleted
              - projects:created
              - projects:updated
              - projects:deleted
            type: string
        secret_token:
          type:
            - "null"
            - string
          description: Secret token used to sign webhook payloads for verification
        active:
          type: boolean
          description: Whether the webhook is active and will receive events
        custom_headers:
          type: object
          description: Custom HTTP headers to include in webhook requests
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
          description: ISO8601 timestamp of when the webhook was created
        updated_at:
          type: string
          format: date-time
          description: ISO8601 timestamp of when the webhook was last updated
      required:
        - id
        - account_id
        - url
        - subscriptions
        - active
        - custom_headers
        - created_at
        - updated_at
